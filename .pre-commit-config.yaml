# Forge pre-commit (FAST hooks only — sub-2-second).
# Heavy gate (lint+typecheck+tests+build) lives in scripts/pre-push.sh.
# See docs/ENGINEERING_STANDARDS.md §7 for the philosophy.
#
# Install both hooks:
#   uv run pre-commit install --hook-type pre-commit --hook-type pre-push

default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-yaml
      - id: check-json
        exclude: ^(ui/tsconfig\.json|tests/data/)
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Bumped from v0.8.4 → v0.15.12 to match the local ruff version
    # (pyproject.toml uses RUF059 which was added after v0.8.4). The hook
    # ID was also renamed ``ruff`` → ``ruff-check`` around v0.9.
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Heavy gate routed to pre-push stage. The actual logic lives in
  # scripts/pre-push.sh so we can do conditional checks based on the diff.
  - repo: local
    hooks:
      - id: pre-push-gate
        name: Heavy gate (lint + typecheck + tests, conditional on diff)
        entry: bash scripts/pre-push.sh
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
