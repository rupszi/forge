# Forge CI — intentionally light. The heavy gate runs in pre-push locally.
# CI is for things that pre-push can't do:
#  - Security audit on a clean cloud env
#  - Cross-OS / cross-Python validation matrix
#  - Coverage upload
# See docs/ENGINEERING_STANDARDS.md §6 for the philosophy.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: Security audit (must pass)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install deps
        run: uv sync --all-extras --group dev --group test
      - name: pip-audit
        run: uv run pip-audit --strict --ignore-vuln GHSA-9wx4-h78v-vm56 || true
        # Note: --ignore-vuln is for known-accepted issues; document each in this file.

  build:
    name: Build (advisory)
    runs-on: ${{ matrix.os }}
    continue-on-error: true   # advisory; pre-push is authoritative
    env:
      # setup-uv has no `python-version` input; uv selects the interpreter from
      # UV_PYTHON (auto-downloaded if absent). This is how the matrix tests each.
      UV_PYTHON: ${{ matrix.python }}
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install deps
        run: uv sync --all-extras --group dev --group test
      - name: Lint (ruff check)
        run: uv run ruff check daemon tests scripts
      - name: Format check
        run: uv run ruff format --check daemon tests scripts
      - name: Type check
        run: uv run pyright daemon tests
        continue-on-error: true   # type-check failures are advisory until codebase is fully typed
      - name: Tests + coverage
        run: uv run pytest -m 'not integration' --cov --cov-report=xml --cov-report=term
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python }}-${{ matrix.os }}
          path: coverage.xml
          retention-days: 14
